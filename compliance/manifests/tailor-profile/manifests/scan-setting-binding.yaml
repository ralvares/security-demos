apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSettingBinding
metadata:
  name: demo-cis-binding
  namespace: openshift-compliance
profiles:
  # This must match the name in your TailoredProfile metadata
  - name: demo-targeted-profile
    kind: TailoredProfile
    apiGroup: compliance.openshift.io/v1alpha1
settingsRef:
  # 'default' runs once a day. 
  # Use 'default-auto-apply' if you want it to fix things automatically.
  name: default
  kind: ScanSetting
  apiGroup: compliance.openshift.io/v1alpha1