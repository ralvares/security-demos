apiVersion: policy.open-cluster-management.io/v1
kind: PolicySet
metadata:
  name: httpd-server-version-2.4.50-policyset
  namespace: stackrox
  labels:
    security.openshift.io/rhacs: "true"
    compliance.cis: "true"
    compliance.pci: "true"
  annotations:
    description: |
      PolicySet for enforcing Apache HTTPD version policy via RHACS.
      Mapped controls:
        - CIS 5.2.2: Ensure only approved ports, protocols, and services are allowed
        - CIS 5.4.1: Ensure image vulnerability scanning
        - PCI DSS 6.2: Ensure all system components and software are protected from known vulnerabilities
spec:
  description: Enforces httpd version policy and maps to CIS/PCI controls.
  policies:
    - httpd-server-version-2.4.50
