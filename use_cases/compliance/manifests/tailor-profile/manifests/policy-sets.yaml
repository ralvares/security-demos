# PolicySets group policies for the ACM Governance dashboard.
# Each set gets its own PlacementBinding referencing the built-in
# 'global' Placement, which selects all managed clusters.
#
# Dashboard view: Governance -> Policy Sets -> three tiles (network-controls,
# access-controls, workload-hardening) with aggregated compliance status.

---
apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: network-controls
  namespace: acm-policies
spec:
  description: >-
    Verifies network policy enforcement across managed clusters.
    Covers both Compliance Operator scanning (ocp4-cis) and ACM-native
    NetworkPolicy detection.
  policies:
    - netpol-check-acm-configpolicy
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-network-controls
  namespace: acm-policies
placementRef:
  name: default
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: network-controls
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet

---
apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: access-controls
  namespace: acm-policies
spec:
  description: >-
    Audits identity and RBAC posture for least-privilege compliance.
    Flags over-privileged service accounts, dangerous ClusterRoleBindings,
    and wildcard role grants across all user namespaces.
  policies:
    - enforce-sa-token-automount-off
    - detect-anonymous-and-wildcard-rbac
    - detect-overprivileged-rbac-bindings
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-access-controls
  namespace: acm-policies
placementRef:
  name: default
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: access-controls
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet

---
apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: workload-hardening
  namespace: acm-policies
spec:
  description: >-
    Detects and prevents workload privilege escalation and host escape.
    Combines detective ConfigurationPolicies (inform) with preventive
    ValidatingAdmissionPolicies (enforce/opt-in) to layer runtime and
    admission-time controls.
  policies:
    - enforce-workload-namespace-isolation
    - detect-default-sa-and-scc-weakness
    - detect-privileged-container-pods
    - block-privileged-containers-via-vap
    - block-host-escape-vectors-via-vap
    - detect-containers-missing-resources
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-workload-hardening
  namespace: acm-policies
placementRef:
  name: default
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: workload-hardening
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet
